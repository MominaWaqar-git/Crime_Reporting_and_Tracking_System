version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: crimevision_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrongPassword123! -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - sql-data:/var/opt/mssql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  crimevision:
    build:
      context: ./Crime_Reporting_and_Tracking_System
      dockerfile: Dockerfile
    container_name: crimevision_app
    ports:
      - "8080:80"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=CrimeDB;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./wwwroot/uploads:/app/wwwroot/uploads

volumes:
  sql-data: